<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Data Prep, Cleaning and Modeling</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1d4ed8; --secondary: #f97316; --text: #1f2937; --muted: #6b7280; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(249, 115, 22, 0.22), transparent 25%), linear-gradient(135deg, #dbeafe 0%, #eff6ff 45%, #ffedd5 100%);
            padding: 32px 20px 60px;
        }
        .page { max-width: 1100px; margin: 0 auto; }
        .hero, .gallery-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 45px rgba(29, 78, 216, 0.16);
        }
        .hero { margin-bottom: 28px; }
        .back-link { display: inline-block; margin-bottom: 18px; color: var(--primary); text-decoration: none; font-weight: 600; }
        h1 { font-family: 'Fredoka', cursive; font-size: clamp(2rem, 4vw, 3rem); color: var(--primary); margin-bottom: 10px; }
        .subtitle { color: var(--muted); font-size: 1.05rem; line-height: 1.7; margin-bottom: 24px; }
        .actions { display: flex; flex-wrap: wrap; gap: 14px; }
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 999px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }
        .btn-secondary { background: #dbeafe; color: var(--primary); }
        .btn:hover { transform: translateY(-2px); }
        .gallery-section h2 { font-family: 'Fredoka', cursive; font-size: 2rem; margin-bottom: 20px; color: #1e3a8a; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .shot { background: #f8fafc; border-radius: 22px; overflow: hidden; border: 1px solid rgba(29, 78, 216, 0.12); }
        .shot img { display: block; width: 100%; height: 250px; object-fit: cover; background: white; }
        .shot p { padding: 14px 16px 18px; color: var(--muted); font-size: 0.95rem; }
        @media (max-width: 640px) { .hero, .gallery-section { padding: 22px; } }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <a class="back-link" href="index.html">&larr; Back to portfolio</a>

            <p class="subtitle">This page displays the screenshots for the Power Query workflow, including data preparation, cleaning, and modeling output. You can also open the GitHub page for the task from here.</p>
            <div class="actions">
                <a class="btn btn-primary" href="https://github.com/akalarcon23-0087-cell/My-porfolio/blob/77f95e29087f6df4618b4c636435f4716338d124/Midterm%20Task%203/README.md" target="_blank" rel="noopener noreferrer">Open on GitHub</a>
                <a class="btn btn-secondary" href="index.html#tasks">Go to task list</a>
            </div>
        </section>

        <section class="gallery-section">
            <h2>Task 3 Screenshots</h2>
            <div class="gallery">
                <figure class="shot">
                    <img src="Midterm%20Task%203/MidtermTask3.png" alt="Task 3 screenshot 1">
                    <p>Initial Power Query data transformation view.</p>
                </figure>
                <figure class="shot">
                    <img src="Midterm%20Task%203/MidtermTask3(1).png" alt="Task 3 screenshot 2">
                    <p>Additional transformation logic and cleanup steps.</p>
                </figure>
                <figure class="shot">
                    <img src="Midterm%20Task%203/MidtermTask3(2).png" alt="Task 3 screenshot 3">
                    <p>Model preparation with structured query output.</p>
                </figure>
                <figure class="shot">
                    <img src="Midterm%20Task%203/MidtermTask3(3).png" alt="Task 3 screenshot 4">
                    <p>Data relationship or modeling progress.</p>
                </figure>
                <figure class="shot">
                    <img src="Midterm%20Task%203/MidtermTask3(4).png" alt="Task 3 screenshot 5">
                    <p>Final transformed data and completed workflow.</p>
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
